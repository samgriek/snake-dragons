        ctx.font = 'bold 18px Arial';
        ctx.fillText('Resume', cx, rBtnY + 27);

        // Controls button
        const cBtnY = rBtnY + 55;
        const cHover = ptInRect(mouseX, mouseY, rBtnX, cBtnY, rBtnW, rBtnH);
        if (cHover) hovering = true;
        if (mouseClicked && cHover) { controlsFrom = 'paused'; controlsCursor = 0; state = 'controls'; }

        ctx.fillStyle = cHover ? 'rgba(100,180,220,0.2)' : 'rgba(255,255,255,0.08)';
        ctx.strokeStyle = cHover ? '#6af' : '#888';
        ctx.lineWidth = cHover ? 2 : 1;
        ctx.strokeRect(rBtnX, cBtnY, rBtnW, rBtnH);
        ctx.fillRect(rBtnX, cBtnY, rBtnW, rBtnH);
        ctx.fillStyle = cHover ? '#adf' : '#8ab';
        ctx.font = 'bold 18px Arial';
        ctx.fillText('Controls', cx, cBtnY + 27);

        // Quit to menu button
        const qBtnY = cBtnY + 55;
        const qHover = ptInRect(mouseX, mouseY, rBtnX, qBtnY, rBtnW, rBtnH);
        if (qHover) hovering = true;
        if (mouseClicked && qHover) { state = 'menu'; }

        ctx.fillStyle = qHover ? 'rgba(255,80,80,0.2)' : 'rgba(255,255,255,0.08)';
        ctx.strokeStyle = qHover ? '#f66' : '#888';
        ctx.lineWidth = qHover ? 2 : 1;
        ctx.strokeRect(rBtnX, qBtnY, rBtnW, rBtnH);
        ctx.fillRect(rBtnX, qBtnY, rBtnW, rBtnH);
        ctx.fillStyle = qHover ? '#faa' : '#888';
        ctx.font = 'bold 18px Arial';
        ctx.fillText('Quit to Menu', cx, qBtnY + 27);

        canvas.style.cursor = hovering ? 'pointer' : 'default';
        mouseClicked = false;
    }

    function renderControls() {
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2, cy = canvas.height / 2;
        const startY = cy - (ACTIONS.length + 2) * 19;

        ctx.fillStyle = '#4af';
        ctx.font = 'bold 32px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('CONTROLS', cx, startY - 20);

        ctx.fillStyle = '#889';
        ctx.font = '13px monospace';
        ctx.fillText('Up/Down to navigate, SPACE/Enter to rebind, ESC to go back', cx, startY + 10);

        // Action rows
        for (let i = 0; i < ACTIONS.length; i++) {
            const a = ACTIONS[i];
            const y = startY + 50 + i * 38;
            const selected = controlsCursor === i;
            const isRebinding = rebindState !== null && rebindState.actionIndex === i;

            // Row background
            if (selected) {
                ctx.fillStyle = 'rgba(74,144,226,0.15)';
                ctx.fillRect(cx - 220, y - 14, 440, 32);
            }

            // Action label
            ctx.fillStyle = selected ? '#fff' : '#aaa';
            ctx.font = '15px monospace';
            ctx.textAlign = 'right';
            ctx.fillText(a.label, cx - 30, y + 4);

            // Key display
            if (isRebinding) {
                const blink = Math.sin(menuTime * 8) > 0;
                ctx.fillStyle = blink ? '#ff0' : '#880';
                ctx.font = 'bold 15px monospace';
                ctx.textAlign = 'left';
                ctx.fillText('[ Press a key... ]', cx + 10, y + 4);
            } else {
                const bound = binds[a.id];
                ctx.fillStyle = selected ? '#4af' : '#6a8';
                ctx.font = 'bold 15px monospace';
                ctx.textAlign = 'left';
                const display = bound ? keyName(bound) : '(unbound)';
                ctx.fillText(display, cx + 10, y + 4);
            }
        }

        // Reset defaults button
        const resetY = startY + 50 + ACTIONS.length * 38 + 15;
        const resetSel = controlsCursor === ACTIONS.length;
        ctx.fillStyle = resetSel ? 'rgba(255,200,50,0.15)' : 'transparent';
        ctx.fillRect(cx - 100, resetY - 14, 200, 30);
        ctx.fillStyle = resetSel ? '#ff0' : '#888';
        ctx.font = resetSel ? 'bold 15px monospace' : '14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('Reset to Defaults', cx, resetY + 5);

        // Back button
        const backY = resetY + 38;
        const backSel = controlsCursor === ACTIONS.length + 1;
        ctx.fillStyle = backSel ? 'rgba(100,200,255,0.15)' : 'transparent';
        ctx.fillRect(cx - 100, backY - 14, 200, 30);
        ctx.fillStyle = backSel ? '#4af' : '#888';
        ctx.font = backSel ? 'bold 15px monospace' : '14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('Back', cx, backY + 5);
    }

    function renderGameOver() {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        let hovering = false;

        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#f44';
        ctx.font = 'bold 52px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', cx, cy - 50);
        ctx.fillStyle = '#fff';
        ctx.font = '22px monospace';
        ctx.fillText(`Score: ${score}    Kills: ${kills}    Waves: ${wave}`, cx, cy + 10);
        ctx.fillStyle = '#888';
        ctx.font = '16px Arial';
        ctx.fillText(`Difficulty: ${diff.name}`, cx, cy + 38);

        // Continue button - clickable
        const btnW = 260, btnH = 44;
        const btnX = cx - btnW / 2, btnY = cy + 55;
        const btnHover = ptInRect(mouseX, mouseY, btnX, btnY, btnW, btnH);
        if (btnHover) hovering = true;
        if (mouseClicked && btnHover) { state = 'menu'; }

        ctx.fillStyle = btnHover ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)';
        ctx.strokeStyle = btnHover ? '#fff' : '#888';
        ctx.lineWidth = btnHover ? 2 : 1;
        ctx.strokeRect(btnX, btnY, btnW, btnH);
        ctx.fillRect(btnX, btnY, btnW, btnH);
        ctx.fillStyle = btnHover ? '#fff' : '#ccc';
        ctx.font = 'bold 20px Arial';
        ctx.fillText('Continue', cx, btnY + 30);

        canvas.style.cursor = hovering ? 'pointer' : 'default';
        mouseClicked = false;
    }

    // ===================================================================
    // START / RESET GAME
    // ===================================================================
    function startGame() {
        diff = DIFFICULTIES[difficulty]; // Lock in selected difficulty

        // Cleanup
        if (player && player.body) {
            try { Matter.Composite.remove(world, player.body); } catch(e) {}
        }
        for (const e of enemies) {
            if (e.body) try { Matter.Composite.remove(world, e.body); } catch(e2) {}
        }
        for (const t of targets) {
            if (t.body && t.alive) try { Matter.Composite.remove(world, t.body); } catch(e3) {}
        }

        enemies = [];
        targets = [];
        projectiles = [];
        particles = [];
        explosions = [];
        floatingTexts = [];
        score = 0; kills = 0; wave = 0; playTime = 0;
        trainingHits = 0; trainingShots = 0;
        waveTimer = 2.0;

        player = createDragon(ARENA_W / 2, ARENA_H / 2, 'player', {
            color: COLORS.player, health: PLAYER_HP, speed: PLAYER_SPEED
        });
        player.rotation = -Math.PI / 2; // Face up initially

        if (gameMode === 'training') initTrainingTargets();

        cam.x = ARENA_W / 2; cam.y = ARENA_H / 2; cam.shakeAmt = 0;
        state = 'playing';
        lastTime = performance.now();
    }

    // ===================================================================
    // UTILITIES
    // ===================================================================
    function lerpAngle(from, to, speed) {
        let diff = to - from;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        if (Math.abs(diff) < 0.05) return to;
        return from + Math.sign(diff) * Math.min(Math.abs(diff), speed);
    }

    function angleDiff(a, b) {
        let d = b - a;
        while (d > Math.PI) d -= Math.PI * 2;
        while (d < -Math.PI) d += Math.PI * 2;
        return d;
    }

    function adjustBrightness(hex, amount) {
        let r = parseInt(hex.slice(1, 3), 16) + amount;
        let g = parseInt(hex.slice(3, 5), 16) + amount;
        let b = parseInt(hex.slice(5, 7), 16) + amount;
        r = Math.max(0, Math.min(255, r));
        g = Math.max(0, Math.min(255, g));
        b = Math.max(0, Math.min(255, b));
        return `rgb(${r},${g},${b})`;
    }

    // ===================================================================
    // MAIN GAME LOOP
    // ===================================================================
    const FIXED_DT = 1 / 60;
    let accumulator = 0;

    function gameLoop(timestamp) {
        const rawDt = Math.min((timestamp - lastTime) / 1000, 0.1);
        lastTime = timestamp;

        // FPS counter
        fpsFrames++;
        fpsTimer += rawDt;
        if (fpsTimer >= 1) { fps = fpsFrames; fpsFrames = 0; fpsTimer = 0; }

        if (state === 'playing') {
            accumulator += rawDt;
            let steps = 0;
            while (accumulator >= FIXED_DT && steps < 5) {
                playTime += FIXED_DT;
                Matter.Engine.update(engine, FIXED_DT * 1000);
                updatePlayer(FIXED_DT);
                updateEnemies(FIXED_DT);
                updateProjectiles(FIXED_DT);
                updateParticles(FIXED_DT);
                updateExplosions(FIXED_DT);
                updateFloatingTexts(FIXED_DT);
                if (gameMode === 'training') updateTrainingTargets(FIXED_DT);
                else updateWaves(FIXED_DT);
                updateCamera(FIXED_DT);
                accumulator -= FIXED_DT;
                steps++;
            }
            if (steps >= 5) accumulator = 0;
        } else if (state === 'menu' || state === 'controls') {
            menuTime += rawDt;
        } else if (state === 'gameover') {
            playTime += rawDt;
            updateParticles(rawDt);
            updateExplosions(rawDt);
            updateFloatingTexts(rawDt);
        }

        // Render
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (state === 'menu') {
            renderMenu();
        } else if (state === 'controls') {
            if (controlsFrom !== 'menu') {
                renderArena();
                renderParticles();
                renderExplosions();
                renderProjectiles();
                for (const e of enemies) renderDragon(e);
                for (const t of targets) renderTarget(t);
                if (player && player.alive) renderDragon(player);
                renderFloatingTexts();
                renderHUD();
            }
            renderControls();
        } else {
            canvas.style.cursor = 'default';
            mouseClicked = false;
            renderArena();
            renderParticles();
            renderExplosions();
            renderProjectiles();
            for (const e of enemies) renderDragon(e);
            for (const t of targets) renderTarget(t);
            if (player && player.alive) renderDragon(player);
            renderAutoTargetIndicator();
            renderFloatingTexts();
            renderHUD();
            if (state === 'paused') renderPaused();
            if (state === 'gameover') renderGameOver();
        }

        requestAnimationFrame(gameLoop);
    }

    // ===================================================================
    // BOOTSTRAP
    // ===================================================================
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);

    })();
    </script>
